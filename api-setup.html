<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API 키 설정 - SpeechCoach</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .setup-card {
      background: white;
      border-radius: 20px;
      padding: 3rem;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: #333;
    }
    .subtitle {
      color: #666;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .status {
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    .status.warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
    }
    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
      margin: 0.5rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    .btn-success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }
    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
    }
    .btn-outline {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }
    .btn-outline:hover {
      background: #667eea;
      color: white;
    }
    .api-info {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      text-align: left;
    }
    .api-info h3 {
      font-size: 1rem;
      margin-bottom: 0.5rem;
      color: #333;
    }
    .api-info p {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 0.3rem;
    }
    .key-display {
      font-family: 'Courier New', monospace;
      background: #f0f0f0;
      padding: 0.5rem;
      border-radius: 6px;
      font-size: 0.75rem;
      color: #666;
      word-break: break-all;
      margin-top: 0.5rem;
    }
    .actions {
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="setup-card">
    <h1>🤖 API 키 설정 완료</h1>
    <p class="subtitle">Gemini API 키가 성공적으로 설정되었습니다</p>

    <div id="statusMsg"></div>

    <div class="api-info">
      <h3>📊 API 설정 정보</h3>
      <p><strong>API 유형:</strong> Google Gemini</p>
      <p><strong>모델:</strong> gemini-2.0-flash</p>
      <p><strong>요금:</strong> 무료 (분당 60회 요청)</p>
      <div class="key-display" id="keyDisplay"></div>
    </div>

    <div class="actions">
      <button class="btn btn-success" onclick="testAPI()">
        🧪 API 연결 테스트
      </button>
      <button class="btn btn-primary" onclick="goPractice()">
        🎤 연습하러 가기
      </button>
      <button class="btn btn-outline" onclick="goFeedback()">
        💬 피드백 페이지
      </button>
    </div>
  </div>

  <script>
    // API 키 저장
    const apiKey = 'AIzaSyBJBrY9fP36ZVyQbUr4B0fygggXRE_WQpM';
    
    localStorage.setItem('sc_gemini_key', apiKey);
    localStorage.setItem('sc_ai_api', 'gemini');

    // 상태 표시
    const statusMsg = document.getElementById('statusMsg');
    const keyDisplay = document.getElementById('keyDisplay');
    
    statusMsg.className = 'status success';
    statusMsg.innerHTML = '✅ API 키가 localStorage에 저장되었습니다!';
    
    keyDisplay.textContent = 'API 키: AIzaSy...' + apiKey.slice(-8);

    // API 연결 테스트
    async function testAPI() {
      statusMsg.className = 'status info';
      statusMsg.innerHTML = '⏳ API 연결을 테스트하고 있습니다...';

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [{ text: '테스트 메시지에 "연결 성공"이라고만 답하세요.' }]
            }],
            generationConfig: {
              temperature: 0.7,
              maxOutputTokens: 50
            }
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const reply = data.candidates[0].content.parts[0].text;

        statusMsg.className = 'status success';
        statusMsg.innerHTML = `✅ 연결 성공! AI 응답: "${reply}"`;
        
      } catch (error) {
        statusMsg.className = 'status warning';
        statusMsg.innerHTML = `❌ 연결 실패: ${error.message}<br>API 키를 다시 확인하세요.`;
      }
    }

    // 연습 페이지로 이동
    function goPractice() {
      window.location.href = 'practice.html';
    }

    // 피드백 페이지로 이동
    function goFeedback() {
      window.location.href = 'feedback.html';
    }

    // 자동 테스트 실행
    testAPI();
  </script>
</body>
</html>
