<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — SpeechCoach</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: grid; grid-template-columns: 1fr 1fr;
      position: relative; z-index: 1;
    }

    /* left panel */
    .auth-left {
      display: flex; flex-direction: column;
      justify-content: center; padding: 4rem 3rem;
      background: rgba(123,99,248,0.04);
      border-right: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .auth-left::before {
      content: '';
      position: absolute; width: 500px; height: 500px;
      top: -100px; left: -100px;
      background: radial-gradient(circle, rgba(123,99,248,0.14) 0%, transparent 65%);
      pointer-events: none;
    }
    .auth-left::after {
      content: '';
      position: absolute; width: 350px; height: 350px;
      bottom: -50px; right: -50px;
      background: radial-gradient(circle, rgba(233,109,182,0.1) 0%, transparent 65%);
      pointer-events: none;
    }
    .al-content { position: relative; z-index: 1; }
    .al-logo {
      font-size: 1.5rem; font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 3rem;
    }
    .al-headline {
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      font-weight: 900; line-height: 1.2;
      letter-spacing: -0.04em; margin-bottom: 1.2rem;
    }
    .al-headline em {
      font-style: normal;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .al-sub { color: var(--text-dim); font-size: 0.94rem; line-height: 1.8; margin-bottom: 2.5rem; }
    .al-chips { display: flex; flex-direction: column; gap: 0.8rem; }
    .al-chip {
      display: flex; align-items: center; gap: 0.75rem;
      font-size: 0.86rem; color: var(--text-sub);
    }
    .al-chip-icon {
      width: 34px; height: 34px; border-radius: 10px;
      background: rgba(123,99,248,0.1);
      border: 1px solid rgba(123,99,248,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }

    /* right panel */
    .auth-right {
      display: flex; align-items: center; justify-content: center;
      padding: 3rem 2rem;
    }
    .auth-box {
      width: 100%; max-width: 400px;
    }
    .auth-box h2 {
      font-size: 1.5rem; font-weight: 900;
      letter-spacing: -0.03em; margin-bottom: 0.4rem;
    }
    .auth-box .auth-sub {
      color: var(--text-dim); font-size: 0.88rem; margin-bottom: 2rem;
    }

    .form-row-between {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 1.4rem;
    }
    .form-links { display: flex; gap: 0.8rem; font-size: 0.8rem; }

    .error-msg {
      background: rgba(244,98,106,0.08);
      border: 1px solid rgba(244,98,106,0.22);
      color: #ffb3b3; border-radius: var(--r-sm);
      padding: 0.62rem 1rem; font-size: 0.83rem;
      margin-bottom: 1rem; display: none;
    }
    .success-msg {
      background: rgba(16,217,160,0.08);
      border: 1px solid rgba(16,217,160,0.22);
      color: #7fffd4; border-radius: var(--r-sm);
      padding: 0.62rem 1rem; font-size: 0.83rem;
      margin-bottom: 1rem; display: none;
    }
    .divider-or {
      display: flex; align-items: center; gap: 0.8rem;
      margin: 1.3rem 0; color: var(--text-dim); font-size: 0.78rem;
    }
    .divider-or::before, .divider-or::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .auth-foot {
      text-align: center; margin-top: 1.2rem;
      font-size: 0.84rem; color: var(--text-dim);
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .auth-foot a { font-weight: 600; }

    .home-btn {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 1000;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.9rem;
      background: rgba(30, 30, 40, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(123, 99, 248, 0.3);
      border-radius: 12px;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .home-btn:hover {
      background: rgba(123, 99, 248, 0.2);
      border-color: rgba(123, 99, 248, 0.6);
      transform: translateY(-1px);
    }

    .lang-switcher {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 1000;
    }
    .lang-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: rgba(30, 30, 40, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(123, 99, 248, 0.35);
      border-radius: 14px;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .lang-btn:hover {
      background: rgba(123, 99, 248, 0.25);
      border-color: rgba(123, 99, 248, 0.7);
      box-shadow: 0 6px 25px rgba(123, 99, 248, 0.25);
      transform: translateY(-2px);
    }
    .lang-btn svg {
      width: 18px;
      height: 18px;
      transition: transform 0.25s ease;
    }
    .lang-btn.active svg {
      transform: rotate(180deg);
    }
    .lang-dropdown {
      position: absolute;
      bottom: calc(100% + 0.75rem);
      right: 0;
      min-width: 180px;
      background: rgba(20, 20, 28, 0.95);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(123, 99, 248, 0.4);
      border-radius: 14px;
      padding: 0.5rem;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px) scale(0.95);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .lang-dropdown.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }
    .lang-dropdown::before {
      content: '';
      position: absolute;
      bottom: -6px;
      right: 20px;
      width: 12px;
      height: 12px;
      background: rgba(20, 20, 28, 0.95);
      border-right: 1px solid rgba(123, 99, 248, 0.4);
      border-bottom: 1px solid rgba(123, 99, 248, 0.4);
      transform: rotate(45deg);
    }
    .lang-option {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 0.85rem;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 0.87rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .lang-option:hover {
      background: rgba(123, 99, 248, 0.2);
      color: #fff;
    }
    .lang-option.active {
      background: rgba(123, 99, 248, 0.3);
      color: #a78bfa;
    }
    .lang-flag {
      font-size: 1.2rem;
      width: 28px;
      text-align: center;
    }
    @media(max-width:780px){
      .auth-wrap { grid-template-columns: 1fr; }
      .auth-left { display: none; }
      .lang-switcher { bottom: 1rem; right: 1rem; }
      .lang-btn { padding: 0.5rem 0.75rem; font-size: 0.82rem; }
    }
  </style>
</head>
<body>
  <div class="page-glow page-glow-1"></div>
  <div class="page-glow page-glow-2"></div>

  <a href="index.html" class="home-btn" title="홈으로" data-i18n="home-btn">🏠 홈</a>

  <div class="lang-switcher">
    <button class="lang-btn" id="langBtn" aria-label="언어 선택">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.785 10.77 8.07 15.61 3 18.129" />
      </svg>
      <span id="currentLang">한국어</span>
    </button>
    <div class="lang-dropdown" id="langDropdown">
      <a href="#" class="lang-option active" data-lang="ko" data-label="한국어">
        <span class="lang-flag">🇰🇷</span>
        <span>한국어</span>
      </a>
      <a href="#" class="lang-option" data-lang="en" data-label="English">
        <span class="lang-flag">🇺🇸</span>
        <span>English</span>
      </a>
      <a href="#" class="lang-option" data-lang="zh" data-label="中文">
        <span class="lang-flag">🇨🇳</span>
        <span>中文</span>
      </a>
      <a href="#" class="lang-option" data-lang="ja" data-label="日本語">
        <span class="lang-flag">🇯🇵</span>
        <span>日本語</span>
      </a>
      <a href="#" class="lang-option" data-lang="es" data-label="Español">
        <span class="lang-flag">🇪🇸</span>
        <span>Español</span>
      </a>
      <a href="#" class="lang-option" data-lang="fr" data-label="Français">
        <span class="lang-flag">🇫🇷</span>
        <span>Français</span>
      </a>
      <a href="#" class="lang-option" data-lang="de" data-label="Deutsch">
        <span class="lang-flag">🇩🇪</span>
        <span>Deutsch</span>
      </a>
    </div>
  </div>

  <div class="auth-wrap">
    <!-- LEFT -->
    <div class="auth-left">
      <div class="al-content">
        <div class="al-logo">🎤 SpeechCoach</div>
        <div class="al-headline"><span data-i18n="login-left-headline">스피치 실력,</span><br/><em data-i18n="login-left-em">데이터로</em> <span data-i18n="login-left-sub2">키우세요</span></div>
        <p class="al-sub" data-i18n="login-left-desc">AI 가 당신의 목소리를 분석하고<br/>정확한 피드백으로 성장을 돕습니다.</p>
        <div class="al-chips">
          <div class="al-chip" data-i18n="login-chip1"><div class="al-chip-icon">📊</div>실시간 음성 분석 및 WPM 측정</div>
          <div class="al-chip" data-i18n="login-chip2"><div class="al-chip-icon">🤫</div>침묵 감지 & 습관어 분석</div>
          <div class="al-chip" data-i18n="login-chip3"><div class="al-chip-icon">🏆</div>100 점 종합 점수 & AI 피드백</div>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="auth-right">
      <div class="auth-box">
        <h2 data-i18n="login-left-title">다시 만나서 반가워요</h2>
        <p class="auth-sub" data-i18n="login-left-sub">계정에 로그인하세요</p>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <form id="loginForm">
          <div class="form-group">
            <label for="username" data-i18n="login-username">아이디</label>
            <input type="text" id="username" data-i18n-placeholder="login-username-ph" placeholder="아이디를 입력하세요" autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password" data-i18n="login-password">비밀번호</label>
            <input type="password" id="password" data-i18n-placeholder="login-password-ph" placeholder="비밀번호를 입력하세요" autocomplete="current-password" />
          </div>
          <div class="form-row-between">
            <label class="checkbox-group">
              <input type="checkbox" id="rememberMe" /> <span data-i18n="login-remember">로그인 유지</span>
            </label>
            <div class="form-links">
              <a href="#" data-i18n="login-find-id">아이디 찾기</a>
              <a href="#" data-i18n="login-find-pw">비밀번호 찾기</a>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" data-i18n="login-submit">로그인</button>
        </form>

        <div class="divider-or" data-i18n="login-or">또는</div>
        <div class="auth-foot">
          <span data-i18n="login-no-account">계정이 없으신가요?</span>
          <a href="signup.html" data-i18n="login-signup">회원가입</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('rememberMe').checked;
      const err = document.getElementById('errorMsg');
      const ok  = document.getElementById('successMsg');
      err.style.display = ok.style.display = 'none';
      if (!username || !password) {
        err.textContent = '아이디와 비밀번호를 모두 입력해주세요.';
        err.style.display = 'block'; return;
      }
      const result = login(username, password, remember);
      if (result.success) {
        ok.textContent = '로그인 성공! 잠시 후 이동합니다...';
        ok.style.display = 'block';
        setTimeout(() => { window.location.href = 'practice.html'; }, 800);
      } else {
        err.textContent = result.message; err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
