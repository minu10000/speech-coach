<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모의 면접 - SpeechCoach</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .interview-wrap {
      max-width: 860px; margin: 0 auto;
      padding: 2.8rem 1.5rem 6rem;
      position: relative; z-index: 1;
    }
    .pg-header { margin-bottom: 2rem; }
    .pg-header h1 { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.03em; }
    .pg-header p { color: var(--text-dim); font-size: 0.88rem; margin-top: 0.3rem; }

    /* Scenario Cards */
    .scenario-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .scenario-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .scenario-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(123, 99, 248, 0.15);
    }
    .scenario-card.selected {
      border-color: var(--primary);
      background: rgba(123, 99, 248, 0.05);
    }
    .scenario-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--grad);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    .scenario-card:hover::before,
    .scenario-card.selected::before {
      transform: scaleX(1);
    }
    .scenario-category {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.8rem;
    }
    .cat-interview { background: rgba(123, 99, 248, 0.15); color: #a78bfa; }
    .cat-presentation { background: rgba(16, 185, 129, 0.15); color: #34d399; }
    .cat-speech { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
    .cat-conversation { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
    .scenario-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .scenario-desc {
      font-size: 0.85rem;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 0.8rem;
    }
    .scenario-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.75rem;
      color: var(--text-dim);
    }
    .scenario-meta span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* Question Display */
    .question-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-2xl);
      padding: 2.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .question-section::before {
      content: '';
      position: absolute;
      width: 400px; height: 300px;
      top: -100px; left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(123,99,248,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .question-label {
      font-size: 0.73rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }
    .question-text {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 1.5rem;
    }
    .question-tips {
      background: rgba(123, 99, 248, 0.05);
      border: 1px solid rgba(123, 99, 248, 0.2);
      border-radius: var(--r-lg);
      padding: 1rem;
      text-align: left;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .question-tips strong {
      color: var(--text-sub);
      display: block;
      margin-bottom: 0.5rem;
    }
    .question-tips ul {
      margin: 0;
      padding-left: 1.2rem;
    }
    .question-tips li {
      margin-bottom: 0.3rem;
    }

    /* Timer & Controls */
    .timer-display {
      font-size: 4rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 1.5rem 0;
    }
    .control-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Category Filter */
    .category-filter {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .filter-btn {
      padding: 0.5rem 1rem;
      background: rgba(30, 30, 40, 0.8);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .filter-btn:hover {
      border-color: var(--primary);
      background: rgba(123, 99, 248, 0.1);
    }
    .filter-btn.active {
      background: var(--grad);
      border-color: transparent;
      color: #fff;
    }

    /* Progress */
    .progress-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .progress-title {
      font-size: 0.95rem;
      font-weight: 700;
    }
    .progress-count {
      font-size: 0.85rem;
      color: var(--text-dim);
    }
    .progress-bar-wrap {
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--grad);
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    @media (max-width: 768px) {
      .scenario-grid { grid-template-columns: 1fr; }
      .question-text { font-size: 1.2rem; }
      .timer-display { font-size: 3rem; }
    }

    /* Language Switcher */
    .lang-switcher { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 1000; }
    .lang-btn {
      display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1rem;
      background: rgba(30, 30, 40, 0.85); backdrop-filter: blur(12px);
      border: 1px solid rgba(123, 99, 248, 0.35); border-radius: 14px;
      color: #fff; font-size: 0.88rem; font-weight: 600; cursor: pointer;
      transition: all 0.25s ease; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .lang-btn:hover {
      background: rgba(123, 99, 248, 0.25); border-color: rgba(123, 99, 248, 0.7);
      box-shadow: 0 6px 25px rgba(123, 99, 248, 0.25); transform: translateY(-2px);
    }
    .lang-btn svg { width: 18px; height: 18px; transition: transform 0.25s ease; }
    .lang-btn.active svg { transform: rotate(180deg); }
    .lang-dropdown {
      position: absolute; bottom: calc(100% + 0.75rem); right: 0; min-width: 160px;
      background: rgba(20, 20, 28, 0.95); backdrop-filter: blur(16px);
      border: 1px solid rgba(123, 99, 248, 0.4); border-radius: 14px; padding: 0.5rem;
      opacity: 0; visibility: hidden; transform: translateY(10px) scale(0.95);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .lang-dropdown.show { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
    .lang-dropdown::before {
      content: ''; position: absolute; bottom: -6px; right: 20px; width: 12px; height: 12px;
      background: rgba(20, 20, 28, 0.95); border-right: 1px solid rgba(123, 99, 248, 0.4);
      border-bottom: 1px solid rgba(123, 99, 248, 0.4); transform: rotate(45deg);
    }
    .lang-option {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.7rem 0.85rem;
      border-radius: 10px; color: #e0e0e0; font-size: 0.87rem;
      cursor: pointer; transition: all 0.2s ease; text-decoration: none;
    }
    .lang-option:hover { background: rgba(123, 99, 248, 0.2); color: #fff; }
    .lang-option.active { background: rgba(123, 99, 248, 0.3); color: #a78bfa; }
    .lang-flag { font-size: 1.2rem; width: 28px; text-align: center; }
    @media(max-width:768px){ .lang-switcher { bottom: 1rem; right: 1rem; } .lang-btn { padding: 0.5rem 0.75rem; font-size: 0.82rem; } }
  </style>
</head>
<body>
  <div class="page-glow page-glow-1"></div>
  <div class="page-glow page-glow-2"></div>

  <nav class="navbar">
    <a href="index.html" class="logo">🎤 SpeechCoach</a>
    <ul class="nav-links">
      <li><a href="practice.html" data-i18n="nav-practice">연습하기</a></li>
      <li><a href="interview.html" data-i18n="nav-interview">모의 면접</a></li>
      <li><a href="stats.html" data-i18n="nav-stats">내 기록</a></li>
      <li class="auth-only"><a href="profile.html" data-i18n="nav-profile">프로필</a></li>
      <li class="guest-only"><a href="login.html" data-i18n="nav-login">로그인</a></li>
    </ul>
  </nav>

  <div class="lang-switcher">
    <button class="lang-btn" id="langBtn" aria-label="언어 선택">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.785 10.77 8.07 15.61 3 18.129" />
      </svg>
      <span id="currentLang">한국어</span>
    </button>
    <div class="lang-dropdown" id="langDropdown">
      <a href="#" class="lang-option active" data-lang="ko" data-label="한국어"><span class="lang-flag">🇰🇷</span><span>한국어</span></a>
      <a href="#" class="lang-option" data-lang="en" data-label="English"><span class="lang-flag">🇺🇸</span><span>English</span></a>
      <a href="#" class="lang-option" data-lang="zh" data-label="中文"><span class="lang-flag">🇨🇳</span><span>中文</span></a>
      <a href="#" class="lang-option" data-lang="ja" data-label="日本語"><span class="lang-flag">🇯🇵</span><span>日本語</span></a>
      <a href="#" class="lang-option" data-lang="es" data-label="Español"><span class="lang-flag">🇪🇸</span><span>Español</span></a>
      <a href="#" class="lang-option" data-lang="fr" data-label="Français"><span class="lang-flag">🇫🇷</span><span>Français</span></a>
      <a href="#" class="lang-option" data-lang="de" data-label="Deutsch"><span class="lang-flag">🇩🇪</span><span>Deutsch</span></a>
    </div>
  </div>

  <div class="interview-wrap">
    <div class="pg-header">
      <h1 data-i18n="interview-title">모의 면접</h1>
      <p data-i18n="interview-sub">실제 면접 상황을 가정하여 연습하세요</p>
    </div>

    <!-- Category Filter -->
    <div class="category-filter" id="categoryFilter">
      <button class="filter-btn active" data-category="all">전체</button>
      <button class="filter-btn" data-category="interview">면접</button>
      <button class="filter-btn" data-category="presentation">발표</button>
      <button class="filter-btn" data-category="speech">스피치</button>
      <button class="filter-btn" data-category="conversation">대화</button>
    </div>

    <!-- Progress -->
    <div class="progress-section">
      <div class="progress-header">
        <div class="progress-title">📈 오늘의 연습 진행도</div>
        <div class="progress-count" id="progressCount">0 / 5 회</div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <!-- Scenario Grid -->
    <div class="scenario-grid" id="scenarioGrid"></div>

    <!-- Question Section -->
    <div id="questionSection" style="display: none;">
      <div class="question-section">
        <div class="question-label">면접 질문</div>
        <div class="question-text" id="questionText"></div>
        <div class="question-tips" id="questionTips"></div>
        
        <div class="timer-display" id="timerDisplay">00:00</div>
        
        <div class="control-buttons">
          <button class="btn btn-primary btn-lg" id="startBtn" onclick="startInterview()">
            🎤 답변 시작
          </button>
          <button class="btn btn-danger btn-lg" id="stopBtn" onclick="stopInterview()" style="display: none;">
            ⏹ 답변 종료
          </button>
          <button class="btn btn-outline btn-lg" onclick="showNextQuestion()">
            ➡️ 다음 질문
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/interview.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof applyNavAuth === 'function') {
        applyNavAuth();
      }
    });
  </script>
</body>
</html>
