<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연습 기록 상세 — SpeechCoach</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .detail-wrap {
      max-width: 900px; margin: 0 auto;
      padding: 2.8rem 1.5rem 6rem;
      position: relative; z-index: 1;
    }
    .pg-header { margin-bottom: 2rem; }
    .pg-header h1 { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.03em; }
    .pg-header p { color: var(--text-dim); font-size: 0.88rem; margin-top: 0.3rem; }

    /* back button */
    .back-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1rem; border-radius: 99px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-sub); font-size: 0.85rem; cursor: pointer;
      margin-bottom: 1.2rem; transition: all 0.15s;
    }
    .back-btn:hover { border-color: var(--border-p); color: var(--text); }

    /* score card */
    .score-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-2xl); padding: 2.5rem 2rem;
      text-align: center; margin-bottom: 1.5rem;
      position: relative; overflow: hidden;
    }
    .score-card::before {
      content: '';
      position: absolute; width: 500px; height: 350px;
      top: -100px; left: 50%; transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(123,99,248,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .score-label {
      font-size: 0.73rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-dim); margin-bottom: 1rem; position: relative;
    }
    .score-number {
      font-size: 5rem; font-weight: 900; line-height: 1;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -0.06em;
      margin-bottom: 0.3rem; position: relative;
    }
    .score-max { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 1.2rem; position: relative; }
    .score-grade {
      display: inline-block; padding: 0.4rem 1.3rem;
      border-radius: 99px; font-size: 0.88rem; font-weight: 700;
      position: relative; letter-spacing: 0.02em;
    }

    /* grid */
    .detail-grid {
      display: grid; grid-template-columns: repeat(2,1fr);
      gap: 1rem; margin-bottom: 1.5rem;
    }
    @media(max-width:600px){ .detail-grid{grid-template-columns:1fr;} }

    /* stat card */
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-xl); padding: 1.3rem;
    }
    .stat-title {
      font-size: 0.85rem; font-weight: 700; color: var(--text-dim);
      margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .stat-title::before {
      content: ''; display: block; width: 3px; height: 14px;
      background: var(--grad); border-radius: 99px;
    }
    .stat-value {
      font-size: 1.8rem; font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-desc { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.4rem; }

    /* chart */
    .chart-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-xl); padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .chart-title {
      font-size: 0.95rem; font-weight: 700;
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .chart-title::before {
      content: ''; display: block; width: 3px; height: 16px;
      background: var(--grad); border-radius: 99px;
    }
    .chart-container {
      position: relative; height: 280px;
      display: flex; justify-content: center;
    }

    /* audio player */
    .audio-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-xl); padding: 1.3rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .audio-title {
      font-size: 0.85rem; font-weight: 700; color: var(--text-dim);
      margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .audio-title::before {
      content: ''; display: block; width: 3px; height: 14px;
      background: var(--grad); border-radius: 99px;
    }
    .audio-controls {
      display: flex; align-items: center; gap: 0.8rem;
    }
    .audio-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--grad); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.15s;
    }
    .audio-btn:hover { transform: scale(1.05); }
    .audio-btn:active { transform: scale(0.95); }
    .audio-btn svg { width: 18px; height: 18px; fill: #fff; }
    .download-btn {
      background: linear-gradient(135deg, #10b981, #059669);
    }
    .download-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4);
    }
    .audio-progress {
      flex: 1; height: 6px; background: var(--border);
      border-radius: 99px; cursor: pointer;
      position: relative; overflow: hidden;
    }
    .audio-progress-bar {
      height: 100%; background: var(--grad);
      border-radius: 99px; width: 0%;
    }
    .audio-time {
      font-size: 0.78rem; color: var(--text-dim);
      min-width: 80px; text-align: right;
    }

    /* transcript */
    .transcript-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-xl); padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .transcript-title {
      font-size: 0.9rem; font-weight: 700;
      margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .transcript-title::before {
      content: ''; display: block; width: 3px; height: 14px;
      background: var(--grad); border-radius: 99px;
    }
    .transcript-text {
      font-size: 0.95rem; line-height: 1.8; color: var(--text-sub);
      white-space: pre-wrap;
    }

    /* action items */
    .action-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-xl); padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .action-title {
      font-size: 0.95rem; font-weight: 700;
      margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .action-title::before {
      content: ''; display: block; width: 3px; height: 16px;
      background: var(--grad); border-radius: 99px;
    }
    .action-item {
      display: flex; gap: 0.8rem; padding: 0.7rem 0;
      border-bottom: 1px solid var(--border);
    }
    .action-item:last-child { border-bottom: none; }
    .action-num {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--grad); color: #fff;
      font-size: 0.7rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .action-text { font-size: 0.85rem; line-height: 1.6; color: var(--text-sub); }
    .action-text strong { display: block; color: var(--text); margin-bottom: 0.15rem; }

    /* compare button */
    .compare-bar {
      display: flex; gap: 0.8rem; justify-content: center;
      margin-top: 2rem; padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    /* no audio */
    .no-audio {
      text-align: center; padding: 1.5rem;
      color: var(--text-dim); font-size: 0.88rem;
    }

    /* Language Switcher */
    .lang-switcher { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 1000; }
    .lang-btn {
      display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1rem;
      background: rgba(30, 30, 40, 0.85); backdrop-filter: blur(12px);
      border: 1px solid rgba(123, 99, 248, 0.35); border-radius: 14px;
      color: #fff; font-size: 0.88rem; font-weight: 600; cursor: pointer;
      transition: all 0.25s ease; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .lang-btn:hover {
      background: rgba(123, 99, 248, 0.25); border-color: rgba(123, 99, 248, 0.7);
      box-shadow: 0 6px 25px rgba(123, 99, 248, 0.25); transform: translateY(-2px);
    }
    .lang-btn svg { width: 18px; height: 18px; transition: transform 0.25s ease; }
    .lang-btn.active svg { transform: rotate(180deg); }
    .lang-dropdown {
      position: absolute; bottom: calc(100% + 0.75rem); right: 0; min-width: 160px;
      background: rgba(20, 20, 28, 0.95); backdrop-filter: blur(16px);
      border: 1px solid rgba(123, 99, 248, 0.4); border-radius: 14px; padding: 0.5rem;
      opacity: 0; visibility: hidden; transform: translateY(10px) scale(0.95);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .lang-dropdown.show { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
    .lang-dropdown::before {
      content: ''; position: absolute; bottom: -6px; right: 20px; width: 12px; height: 12px;
      background: rgba(20, 20, 28, 0.95); border-right: 1px solid rgba(123, 99, 248, 0.4);
      border-bottom: 1px solid rgba(123, 99, 248, 0.4); transform: rotate(45deg);
    }
    .lang-option {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.7rem 0.85rem;
      border-radius: 10px; color: #e0e0e0; font-size: 0.87rem;
      cursor: pointer; transition: all 0.2s ease; text-decoration: none;
    }
    .lang-option:hover { background: rgba(123, 99, 248, 0.2); color: #fff; }
    .lang-option.active { background: rgba(123, 99, 248, 0.3); color: #a78bfa; }
    .lang-flag { font-size: 1.2rem; width: 28px; text-align: center; }
    @media(max-width:768px){ .lang-switcher { bottom: 1rem; right: 1rem; } .lang-btn { padding: 0.5rem 0.75rem; font-size: 0.82rem; } }
  </style>
</head>
<body>
  <div class="page-glow page-glow-1"></div>
  <div class="page-glow page-glow-2"></div>

  <nav class="navbar">
    <a href="index.html" class="logo">🎤 SpeechCoach</a>
    <ul class="nav-links">
      <li><a href="practice.html" data-i18n="nav-practice">연습하기</a></li>
      <li><a href="stats.html" data-i18n="nav-stats">내 기록</a></li>
      <li class="auth-only"><a href="profile.html" data-i18n="nav-profile">프로필</a></li>
      <li class="guest-only"><a href="login.html" data-i18n="nav-login">로그인</a></li>
    </ul>
  </nav>

  <div class="lang-switcher">
    <button class="lang-btn" id="langBtn" aria-label="언어 선택">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.785 10.77 8.07 15.61 3 18.129" />
      </svg>
      <span id="currentLang">한국어</span>
    </button>
    <div class="lang-dropdown" id="langDropdown">
      <a href="#" class="lang-option active" data-lang="ko" data-label="한국어"><span class="lang-flag">🇰🇷</span><span>한국어</span></a>
      <a href="#" class="lang-option" data-lang="en" data-label="English"><span class="lang-flag">🇺🇸</span><span>English</span></a>
      <a href="#" class="lang-option" data-lang="zh" data-label="中文"><span class="lang-flag">🇨🇳</span><span>中文</span></a>
      <a href="#" class="lang-option" data-lang="ja" data-label="日本語"><span class="lang-flag">🇯🇵</span><span>日本語</span></a>
      <a href="#" class="lang-option" data-lang="es" data-label="Español"><span class="lang-flag">🇪🇸</span><span>Español</span></a>
      <a href="#" class="lang-option" data-lang="fr" data-label="Français"><span class="lang-flag">🇫🇷</span><span>Français</span></a>
      <a href="#" class="lang-option" data-lang="de" data-label="Deutsch"><span class="lang-flag">🇩🇪</span><span>Deutsch</span></a>
    </div>
  </div>

  <div class="detail-wrap">
    <button class="back-btn" onclick="history.back()" data-i18n="detail-back">← 뒤로가기</button>

    <div class="pg-header">
      <h1 data-i18n="detail-title">연습 기록 상세</h1>
      <p data-i18n="detail-sub">연습 내용을 자세히 확인하세요</p>
    </div>

    <div id="detailContent"></div>

    <div class="compare-bar" id="compareBar">
      <button class="btn btn-outline" onclick="selectCompareRecord()" data-i18n="detail-btn-compare">📊 다른 기록과 비교하기</button>
      <a href="practice.html" class="btn btn-primary" data-i18n="detail-btn-practice">다시 연습하기</a>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/stats-detail.js"></script>
</body>
</html>
