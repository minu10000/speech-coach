<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini API 테스트</title>
  <style>
    body {
      background: #0f0f14;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .btn {
      padding: 0.8rem 1.5rem;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 1rem;
    }
    .btn:hover { opacity: 0.9; }
    .result {
      background: rgba(30, 30, 40, 0.8);
      border: 1px solid rgba(123, 99, 248, 0.3);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
      white-space: pre-wrap;
      font-size: 0.85rem;
      max-height: 400px;
      overflow-y: auto;
    }
    .error { border-color: rgba(239, 68, 68, 0.5); background: rgba(239, 68, 68, 0.1); }
    .success { border-color: rgba(16, 185, 129, 0.5); background: rgba(16, 185, 129, 0.1); }
  </style>
</head>
<body>
  <h1>🔍 Gemini API 모델 확인기</h1>
  <p>사용 가능한 Gemini 모델을 확인합니다.</p>
  
  <button class="btn" onclick="checkModels()">모델 목록 조회</button>
  <button class="btn" onclick="testGenerateContent()">테스트 생성</button>
  
  <div id="result" class="result"></div>

  <script>
    const API_KEY = 'AIzaSyCBKcV5LObMB94DSyJold0GWBxGBzc-idU';
    
    async function checkModels() {
      const resultDiv = document.getElementById('result');
      resultDiv.className = 'result';
      resultDiv.textContent = '모델 목록을 조회 중...';
      
      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
        
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error?.message || 'API 오류');
        }
        
        const data = await response.json();
        console.log('사용 가능한 모델:', data);
        
        // generateContent 를 지원하는 모델만 필터링
        const supportedModels = data.models.filter(m => 
          m.supportedGenerationMethods?.includes('generateContent')
        ).map(m => ({
          name: m.name.replace('models/', ''),
          displayName: m.displayName,
          description: m.description
        }));
        
        resultDiv.className = 'result success';
        resultDiv.textContent = `✅ 사용 가능한 모델 (${supportedModels.length}개):\n\n` + 
          supportedModels.map(m => `• ${m.name}\n  - ${m.displayName || ''}\n  - ${m.description || ''}`).join('\n\n');
        
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.textContent = `❌ 오류: ${error.message}`;
      }
    }
    
    async function testGenerateContent() {
      const resultDiv = document.getElementById('result');
      resultDiv.className = 'result';
      resultDiv.textContent = '테스트 생성 중...';
      
      // 무료 티어에서 사용 가능한 모델들
      const models = [
        'gemini-1.5-flash',
        'gemini-1.5-flash-001',
        'gemini-1.5-flash-002',
        'gemini-1.5-pro',
        'gemini-1.5-pro-001',
        'gemini-1.5-pro-002',
        'gemini-pro',
        'gemini-pro-vision'
      ];
      
      for (const model of models) {
        resultDiv.textContent += `\n🔄 ${model} 테스트 중...`;
        
        try {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`;
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: 'Hello' }] }]
            })
          });
          
          if (response.ok) {
            resultDiv.className = 'result success';
            resultDiv.textContent += `\n✅ ${model} - 사용 가능!`;
            return; // 첫 번째로 성공한 모델에서 중단
          } else {
            const error = await response.json();
            resultDiv.textContent += `\n❌ ${model} - ${error.error?.message || '오류'}`;
          }
        } catch (error) {
          resultDiv.textContent += `\n❌ ${model} - ${error.message}`;
        }
      }
      
      resultDiv.className = 'result error';
      resultDiv.textContent += '\n\n모든 모델 테스트 실패!';
    }
  </script>
</body>
</html>
