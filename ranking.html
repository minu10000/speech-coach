<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>랭킹 — SpeechCoach</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .ranking-wrap {
      max-width: 1000px; margin: 0 auto;
      padding: 2.8rem 1.5rem 6rem;
      position: relative; z-index: 1;
    }
    .pg-header { margin-bottom: 2rem; }
    .pg-header h1 { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.03em; }
    .pg-header p { color: var(--text-dim); font-size: 0.88rem; margin-top: 0.3rem; }

    /* Category tabs */
    .category-tabs {
      display: flex; gap: 0.5rem; margin-bottom: 2rem;
      overflow-x: auto; padding-bottom: 0.5rem;
    }
    .category-tab {
      padding: 0.8rem 1.5rem; border-radius: var(--r-xl);
      background: var(--card); border: 1px solid var(--border);
      color: var(--text-dim); font-weight: 700; font-size: 0.88rem;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .category-tab:hover { border-color: var(--border-p); color: var(--text); }
    .category-tab.active {
      background: var(--grad);
      border-color: transparent;
      color: #fff;
    }

    /* Podium */
    .podium {
      display: flex; justify-content: center; align-items: flex-end;
      gap: 1rem; margin-bottom: 3rem; padding: 2rem 0;
    }
    .podium-item {
      text-align: center; flex: 1; max-width: 200px;
    }
    .podium-rank {
      font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem;
    }
    .podium-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      margin: 0 auto 0.8rem; display: flex; align-items: center;
      justify-content: center; font-size: 2.5rem;
      border: 3px solid var(--border);
      background: var(--card);
    }
    .podium-item:nth-child(2) .podium-avatar {
      width: 100px; height: 100px; font-size: 3rem;
      border-color: #fbbf24;
      box-shadow: 0 0 30px rgba(251, 191, 36, 0.4);
    }
    .podium-item:nth-child(1) .podium-avatar {
      border-color: #94a3b8;
      box-shadow: 0 0 20px rgba(148, 163, 184, 0.3);
    }
    .podium-item:nth-child(3) .podium-avatar {
      border-color: #d97706;
      box-shadow: 0 0 20px rgba(217, 119, 6, 0.3);
    }
    .podium-name {
      font-size: 0.9rem; font-weight: 700; margin-bottom: 0.3rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .podium-score {
      font-size: 1.2rem; font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .podium-bar {
      height: 120px; background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      margin-top: 1rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 900; color: var(--text-dim);
    }
    .podium-item:nth-child(2) .podium-bar { height: 160px; }
    .podium-item:nth-child(1) .podium-bar { height: 100px; }
    .podium-item:nth-child(3) .podium-bar { height: 80px; }

    /* Ranking list */
    .ranking-list {
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .ranking-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-xl); padding: 1.2rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
      transition: all 0.2s;
    }
    .ranking-item:hover {
      border-color: var(--border-p);
      transform: translateX(4px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
    }
    .ranking-item.is-me {
      border-color: var(--p1);
      background: rgba(123, 99, 248, 0.1);
    }
    .ranking-pos {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 900;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text-dim); flex-shrink: 0;
    }
    .ranking-item:nth-child(1) .ranking-pos { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #fff; border-color: #fbbf24; }
    .ranking-item:nth-child(2) .ranking-pos { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; border-color: #94a3b8; }
    .ranking-item:nth-child(3) .ranking-pos { background: linear-gradient(135deg, #d97706, #b45309); color: #fff; border-color: #d97706; }
    
    .ranking-avatar {
      width: 50px; height: 50px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; background: var(--card);
      border: 2px solid var(--border); flex-shrink: 0;
    }
    .ranking-info { flex: 1; min-width: 0; }
    .ranking-name {
      font-size: 1rem; font-weight: 700; margin-bottom: 0.2rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ranking-stats {
      display: flex; gap: 0.8rem; flex-wrap: wrap;
      font-size: 0.78rem; color: var(--text-dim);
    }
    .ranking-stats span { display: flex; align-items: center; gap: 0.3rem; }
    .ranking-score {
      font-size: 1.5rem; font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; flex-shrink: 0;
    }
    .ranking-score-lbl { font-size: 0.68rem; color: var(--text-dim); text-align: center; }

    /* My ranking highlight */
    .my-rank-card {
      background: linear-gradient(135deg, rgba(123,99,248,0.15), rgba(233,109,182,0.15));
      border: 2px solid var(--p1);
      border-radius: var(--r-2xl); padding: 1.5rem;
      margin-bottom: 2rem; display: flex;
      align-items: center; gap: 1.5rem;
    }
    .my-rank-label {
      font-size: 0.82rem; color: var(--text-dim); margin-bottom: 0.3rem;
    }
    .my-rank-value {
      font-size: 1.8rem; font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .my-rank-info { flex: 1; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 5rem 2rem; color: var(--text-dim);
    }
    .empty-state .e-icon { font-size: 3.5rem; opacity: 0.4; display: block; margin-bottom: 1rem; }
    .empty-state h3 { font-size: 1.05rem; font-weight: 700; color: var(--text-sub); margin-bottom: 0.45rem; }
    .empty-state p { font-size: 0.88rem; margin-bottom: 1.8rem; }

    /* Language Switcher */
    .lang-switcher { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 1000; }
    .lang-btn {
      display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1rem;
      background: rgba(30, 30, 40, 0.85); backdrop-filter: blur(12px);
      border: 1px solid rgba(123, 99, 248, 0.35); border-radius: 14px;
      color: #fff; font-size: 0.88rem; font-weight: 600; cursor: pointer;
      transition: all 0.25s ease; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .lang-btn:hover {
      background: rgba(123, 99, 248, 0.25); border-color: rgba(123, 99, 248, 0.7);
      box-shadow: 0 6px 25px rgba(123, 99, 248, 0.25); transform: translateY(-2px);
    }
    .lang-btn svg { width: 18px; height: 18px; transition: transform 0.25s ease; }
    .lang-btn.active svg { transform: rotate(180deg); }
    .lang-dropdown {
      position: absolute; bottom: calc(100% + 0.75rem); right: 0; min-width: 160px;
      background: rgba(20, 20, 28, 0.95); backdrop-filter: blur(16px);
      border: 1px solid rgba(123, 99, 248, 0.4); border-radius: 14px; padding: 0.5rem;
      opacity: 0; visibility: hidden; transform: translateY(10px) scale(0.95);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .lang-dropdown.show { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
    .lang-dropdown::before {
      content: ''; position: absolute; bottom: -6px; right: 20px; width: 12px; height: 12px;
      background: rgba(20, 20, 28, 0.95); border-right: 1px solid rgba(123, 99, 248, 0.4);
      border-bottom: 1px solid rgba(123, 99, 248, 0.4); transform: rotate(45deg);
    }
    .lang-option {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.7rem 0.85rem;
      border-radius: 10px; color: #e0e0e0; font-size: 0.87rem;
      cursor: pointer; transition: all 0.2s ease; text-decoration: none;
    }
    .lang-option:hover { background: rgba(123, 99, 248, 0.2); color: #fff; }
    .lang-option.active { background: rgba(123, 99, 248, 0.3); color: #a78bfa; }
    .lang-flag { font-size: 1.2rem; width: 28px; text-align: center; }
    @media(max-width:768px){ .lang-switcher { bottom: 1rem; right: 1rem; } .lang-btn { padding: 0.5rem 0.75rem; font-size: 0.82rem; } }

    @media(max-width:600px) {
      .podium { gap: 0.5rem; }
      .podium-avatar { width: 60px; height: 60px; font-size: 2rem; }
      .podium-item:nth-child(2) .podium-avatar { width: 80px; height: 80px; font-size: 2.5rem; }
      .ranking-stats { gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="page-glow page-glow-1"></div>
  <div class="page-glow page-glow-2"></div>

  <nav class="navbar">
    <a href="index.html" class="logo">🎤 SpeechCoach</a>
    <ul class="nav-links">
      <li><a href="practice.html" data-i18n="nav-practice">연습하기</a></li>
      <li><a href="stats.html" data-i18n="nav-stats">내 기록</a></li>
      <li class="auth-only"><a href="profile.html" data-i18n="nav-profile">프로필</a></li>
      <li class="guest-only"><a href="login.html" data-i18n="nav-login">로그인</a></li>
    </ul>
  </nav>

  <div class="lang-switcher">
    <button class="lang-btn" id="langBtn" aria-label="언어 선택">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.785 10.77 8.07 15.61 3 18.129" />
      </svg>
      <span id="currentLang">한국어</span>
    </button>
    <div class="lang-dropdown" id="langDropdown">
      <a href="#" class="lang-option active" data-lang="ko" data-label="한국어"><span class="lang-flag">🇰🇷</span><span>한국어</span></a>
      <a href="#" class="lang-option" data-lang="en" data-label="English"><span class="lang-flag">🇺🇸</span><span>English</span></a>
      <a href="#" class="lang-option" data-lang="zh" data-label="中文"><span class="lang-flag">🇨🇳</span><span>中文</span></a>
      <a href="#" class="lang-option" data-lang="ja" data-label="日本語"><span class="lang-flag">🇯🇵</span><span>日本語</span></a>
      <a href="#" class="lang-option" data-lang="es" data-label="Español"><span class="lang-flag">🇪🇸</span><span>Español</span></a>
      <a href="#" class="lang-option" data-lang="fr" data-label="Français"><span class="lang-flag">🇫🇷</span><span>Français</span></a>
      <a href="#" class="lang-option" data-lang="de" data-label="Deutsch"><span class="lang-flag">🇩🇪</span><span>Deutsch</span></a>
    </div>
  </div>

  <div class="ranking-wrap">
    <div class="pg-header">
      <h1 data-i18n="ranking-title">🏆 랭킹</h1>
      <p data-i18n="ranking-sub">카테고리별 순위를 확인하세요</p>
    </div>

    <!-- 카테고리 탭 -->
    <div class="category-tabs">
      <button class="category-tab active" data-category="all" data-i18n="ranking-tab-all">전체</button>
      <button class="category-tab" data-category="pronunciation" data-i18n="ranking-tab-pronunciation">🗣 발음</button>
      <button class="category-tab" data-category="presentation" data-i18n="ranking-tab-presentation">🎤 발표</button>
      <button class="category-tab" data-category="interview" data-i18n="ranking-tab-interview">💼 면접</button>
      <button class="category-tab" data-category="speech" data-i18n="ranking-tab-speech">🎯 스피치</button>
    </div>

    <!-- 내 순위 카드 -->
    <div class="my-rank-card" id="myRankCard" style="display:none;">
      <div class="ranking-avatar">👤</div>
      <div class="my-rank-info">
        <div class="my-rank-label" data-i18n="ranking-my-rank-label">내 순위</div>
        <div class="my-rank-value" id="myRankValue">-</div>
      </div>
    </div>

    <!-- 3등 팟디움 -->
    <div class="podium" id="podium"></div>

    <!-- 전체 랭킹 목록 -->
    <div class="ranking-list" id="rankingList"></div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ranking.js"></script>
</body>
</html>
