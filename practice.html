<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연습 — SpeechCoach</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .practice-wrap {
      max-width: 860px; margin: 0 auto;
      padding: 2.8rem 1.5rem 6rem;
      position: relative; z-index: 1;
    }

    /* page header */
    .pg-header { margin-bottom: 2rem; }
    .pg-header h1 {
      font-size: 1.7rem; font-weight: 900;
      letter-spacing: -0.03em;
    }
    .pg-header p { color: var(--text-dim); font-size: 0.88rem; margin-top: 0.3rem; }

    /* ── TIMER CARD ── */
    .timer-card {
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-2xl);
      padding: 2rem 2.4rem;
      margin-bottom: 1rem;
      position: relative; overflow: hidden;
      box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset;
    }
    .timer-card::before {
      content: '';
      position: absolute; width: 350px; height: 250px;
      top: -80px; right: -60px;
      background: radial-gradient(ellipse, rgba(123,99,248,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .timer-card.recording-active { border-color: rgba(244,98,106,0.3); }
    .timer-card.recording-active::after {
      content: '';
      position: absolute; inset: 0; border-radius: inherit;
      background: rgba(244,98,106,0.025);
    }

    .timer-num {
      font-size: 3.8rem; font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.05em; line-height: 1;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; position: relative; z-index: 1;
    }

    .status-chip {
      display: inline-flex; align-items: center; gap: 0.48rem;
      padding: 0.48rem 1.1rem;
      border-radius: 99px; font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.02em; position: relative; z-index: 1;
    }
    .chip-ready    { background: rgba(123,99,248,0.1); color: #c4bbff; border: 1px solid rgba(123,99,248,0.22); }
    .chip-rec      { background: rgba(244,98,106,0.1); color: #ffb3b3; border: 1px solid rgba(244,98,106,0.28); }
    .chip-done     { background: rgba(16,217,160,0.1); color: #7fffd4; border: 1px solid rgba(16,217,160,0.22); }
    .chip-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; flex-shrink: 0;
    }
    .chip-rec .chip-dot { animation: recPulse 1s ease-in-out infinite; }
    @keyframes recPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.65)} }

    /* ── CONTROLS ── */
    .controls { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 1rem; }

    /* ── TRANSCRIPT ── */
    .transcript-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 1.5rem 1.6rem;
      margin-bottom: 1rem; min-height: 150px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .transcript-card.is-rec {
      border-color: rgba(244,98,106,0.28);
      box-shadow: 0 0 0 1px rgba(244,98,106,0.07);
    }
    .tc-label {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--text-dim); margin-bottom: 0.85rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .transcript-text {
      font-size: 0.97rem; line-height: 2;
      color: var(--text); white-space: pre-wrap; min-height: 75px;
    }
    .transcript-text .interim { color: var(--text-dim); font-style: italic; }
    .transcript-placeholder { color: var(--text-dim); font-style: italic; font-size: 0.9rem; }

    /* ── STATS ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 0.75rem; margin-bottom: 1rem;
    }
    @media(max-width:500px){ .stats-grid{grid-template-columns:repeat(2,1fr);} }

    .st-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 1.15rem; text-align: center;
      transition: border-color 0.18s, transform 0.18s;
    }
    .st-card:hover { border-color: var(--border-p); transform: translateY(-2px); }
    .st-icon { font-size: 1.25rem; display: block; margin-bottom: 0.45rem; }
    .st-val {
      font-size: 1.3rem; font-weight: 800;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -0.025em;
    }
    .st-lbl { font-size: 0.73rem; color: var(--text-dim); margin-top: 0.22rem; }

    /* ── FEEDBACK ── */
    .feedback-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 1.5rem 1.6rem;
      margin-bottom: 1rem;
    }
    .feedback-card .section-title {
      display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.9rem;
    }
    .feedback-card .section-title::before {
      content: ''; display: block;
      width: 3px; height: 17px;
      background: var(--grad); border-radius: 99px;
    }
    .fb-item {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem; line-height: 1.65; color: var(--text-sub);
    }
    .fb-item:last-child { border-bottom: none; }
    .fb-ic { font-size: 0.95rem; flex-shrink: 0; margin-top: 0.15rem; }

    /* ── SAVE BAR ── */
    .save-bar {
      display: flex; gap: 0.75rem; align-items: center;
      justify-content: flex-end; flex-wrap: wrap;
      padding: 1.1rem 1.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
    }

    /* ── AUDIO PLAYER ── */
    .audio-player-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
      display: none;
    }
    .audio-player-wrap.show { display: block; }
    .audio-player-title {
      font-size: 0.85rem; font-weight: 700;
      color: var(--text-dim); margin-bottom: 0.8rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .audio-player-title::before {
      content: ''; display: block; width: 3px; height: 14px;
      background: var(--grad); border-radius: 99px;
    }
    .audio-controls {
      display: flex; align-items: center; gap: 0.8rem;
    }
    .audio-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--grad); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s;
    }
    .audio-btn:hover { transform: scale(1.05); }
    .audio-btn:active { transform: scale(0.95); }
    .audio-btn svg { width: 18px; height: 18px; fill: #fff; }
    .audio-progress {
      flex: 1; height: 6px; background: var(--border);
      border-radius: 99px; cursor: pointer;
      position: relative; overflow: hidden;
    }
    .audio-progress-bar {
      height: 100%; background: var(--grad);
      border-radius: 99px; width: 0%;
      transition: width 0.1s linear;
    }
    .audio-time {
      font-size: 0.78rem; color: var(--text-dim);
      min-width: 80px; text-align: right;
    }
  </style>
</head>
<body>
  <div class="page-glow page-glow-1"></div>
  <div class="page-glow page-glow-2"></div>

  <nav class="navbar">
    <a href="index.html" class="logo">🎤 SpeechCoach</a>
    <ul class="nav-links">
      <li><a href="practice.html">연습하기</a></li>
      <li><a href="stats.html">내 기록</a></li>
      <li class="auth-only"><a href="profile.html">프로필</a></li>
      <li class="guest-only"><a href="login.html">로그인</a></li>
    </ul>
  </nav>

  <div class="practice-wrap">
    <div class="pg-header">
      <h1>스피치 연습</h1>
      <p>버튼을 눌러 연습을 시작하세요. 마이크 권한이 필요합니다.</p>
    </div>

    <div class="timer-card" id="timerCard">
      <div class="timer-num" id="timerDisplay">00:00</div>
      <div class="status-chip chip-ready" id="statusBadge">
        <span class="chip-dot"></span>
        <span id="statusText">준비</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary btn-lg" id="recordBtn" onclick="toggleRecording()">🎤 녹음 시작</button>
      <button class="btn btn-ghost" id="resetBtn" onclick="resetPractice()">↺ 초기화</button>
    </div>

    <div class="transcript-card" id="transcriptBox">
      <div class="tc-label">🔤 음성 인식 텍스트</div>
      <div class="transcript-text" id="transcriptText">
        <span class="transcript-placeholder">녹음을 시작하면 여기에 인식된 텍스트가 표시됩니다...</span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="st-card">
        <span class="st-icon">⏱</span>
        <div class="st-val" id="totalTime">0:00</div>
        <div class="st-lbl">전체 시간</div>
      </div>
      <div class="st-card">
        <span class="st-icon">🗣</span>
        <div class="st-val" id="speakTime">0:00</div>
        <div class="st-lbl">발화 시간</div>
      </div>
      <div class="st-card">
        <span class="st-icon">🤫</span>
        <div class="st-val" id="silenceTime">0:00</div>
        <div class="st-lbl">침묵 시간</div>
      </div>
      <div class="st-card">
        <span class="st-icon">📊</span>
        <div class="st-val" id="silenceRate">0%</div>
        <div class="st-lbl">침묵 비율</div>
      </div>
      <div class="st-card">
        <span class="st-icon">💬</span>
        <div class="st-val" id="wordCount">0</div>
        <div class="st-lbl">단어 수</div>
      </div>
      <div class="st-card">
        <span class="st-icon">⚡</span>
        <div class="st-val" id="wpm">0</div>
        <div class="st-lbl">분당 단어(WPM)</div>
      </div>
    </div>

    <div class="feedback-card" id="feedbackBox" style="display:none;">
      <div class="section-title">분석 결과</div>
      <div id="feedbackList"></div>
    </div>

    <!-- 오디오 플레이어 -->
    <div class="audio-player-wrap" id="audioPlayerWrap">
      <div class="audio-player-title">🔊 내 녹음 파일</div>
      <div class="audio-controls">
        <button class="audio-btn" id="audioPlayBtn" onclick="toggleAudioPlay()">
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>
        </button>
        <div class="audio-progress" id="audioProgress" onclick="seekAudio(event)">
          <div class="audio-progress-bar" id="audioProgressBar"></div>
        </div>
        <div class="audio-time" id="audioTime">0:00 / 0:00</div>
      </div>
    </div>

    <div class="save-bar" id="saveSection" style="display:none;">
      <a href="feedback.html" class="btn btn-outline">AI 상세 피드백 보기</a>
      <button class="btn btn-success btn-lg" onclick="saveResult()">💾 결과 저장</button>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/practice.js"></script>
  <script>
    // 오리지널 함수 저장 후 래핑
    const _originalStart = startRecording;
    const _originalStop = stopRecording;

    startRecording = function() {
      _originalStart();
      document.getElementById('transcriptBox').classList.add('is-rec');
      document.getElementById('timerCard').classList.add('recording-active');
    };

    stopRecording = function() {
      _originalStop();
      document.getElementById('transcriptBox').classList.remove('is-rec');
      document.getElementById('timerCard').classList.remove('recording-active');
    };

    // 초기 상태 설정
    document.getElementById('statusBadge').className = 'status-chip chip-ready';
    
    const _originalSetStatus = setStatus;
    setStatus = function(type, text) {
      const badge = document.getElementById('statusBadge');
      const map = { ready:'chip-ready', recording:'chip-rec', complete:'chip-done' };
      badge.className = 'status-chip ' + (map[type] || 'chip-ready');
      document.getElementById('statusText').textContent = text;
    };
  </script>
</body>
</html>
